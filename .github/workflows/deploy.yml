name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with OpenNext
        run: pnpm cf:build

      - name: Deploy to Cloudflare Pages
        run: |
          mkdir -p deploy-output
          cp -r .open-next/. deploy-output/
          mv deploy-output/worker.js deploy-output/_worker.js
          cp -r public/. deploy-output/
          if [ -d ".next/static" ]; then
            mkdir -p deploy-output/_next
            cp -r .next/static deploy-output/_next/static
          fi
          npx wrangler pages deploy deploy-output --project-name navsphere
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
